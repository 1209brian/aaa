<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>POPCAT</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#bdaa90;
user-select:none;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

/* 標題 */

.title{
width:80%;
max-width:600px;
margin-top:30px;
}

/* 計數 */

#counter{
font-size:100px;
color:white;
-webkit-text-stroke:4px black;
margin-top:20px;
}

/* 貓 */

#cat{

width:900px;
height:600px;

background:url("imgs/p.png") center bottom/contain no-repeat;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<img class="title" src="imgs/popcat.svg">

<div id="counter">0</div>

<div id="cat"></div>

</div>

<script>

const cat = document.getElementById("cat")
const counter = document.getElementById("counter")

let count = 0

function openMouth(){
cat.style.backgroundImage="url('imgs/op.png')"
}

function closeMouth(){
cat.style.backgroundImage="url('imgs/p.png')"
}

function pop(){

count++

counter.innerText=count

}

/* 滑鼠 */

cat.addEventListener("mousedown",()=>{
openMouth()
pop()
})

cat.addEventListener("mouseup",closeMouth)
cat.addEventListener("mouseleave",closeMouth)

/* 手機 */

cat.addEventListener("touchstart",(e)=>{
e.preventDefault()
openMouth()
pop()
})

cat.addEventListener("touchend",closeMouth)

</script>

</body>
</html>
